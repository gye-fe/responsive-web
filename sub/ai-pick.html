<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI추천도서 | 수지도서관</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Pretendard/Pretendard.css">
    <link rel="stylesheet" href="../styles/common.css">
    <link rel="stylesheet" href="styles/ai-pick.css">
    <script src="scripts/sub/서브페이지명.js" defer></script>
</head>
<body>

    <div class="container">
        <aside id="aside">
            
        </aside><!-- // #aside End -->
        <section id="main">
            <p class="navi">
                <span>독서마당</span>
                <span>AI추천도서</span>
            </p>
            <h1 class="tit-main">AI추천도서</h1>

            <!--빗금공간이었던것-->
            <div class="detail-box">
                <dl>
                    <dt>인공지능(AI : Artificial Intelligence) 추천도서</dt>
                    <dd>도서관 이용자의 “개인별 독서 이력”과 “취향 분석”을 통해 맞춤형으로 도서를 추천해드립니다.</dd>
                    <dd>[다시추천받기]버튼을 클릭하시면 취향 분석을 통한 새로운 도서를 추천 받으실 수 있습니다.</dd>
                </dl>
            </div><!--/빗금-->
            <ol>
                <li>연령정보</li>
                <li>관심사</li>
                <li>관심분야</li>
                <li>관심도서</li>
                <li>추천결과</li>
            </ol>
            
            <h2 class="blind">4단계 과정을 거치면 AI가 알맞은 책을 추천해드립니다</h2>
            <p><span class="select-val">당신의 연령대를 선택해주세요</span><span class="dupli-info"></span></p>

            <!--버튼 박스 input 1번째는 라디오, 2~3번째는 체크박스-->
            <form class="user-select-area">
                <!--1~3번째 부분-->
                <p><!--3개 선택한 미리보기 부분 자식 3개 div 넣어야함 평소 가리기--><!--4 관심도서 부분-->
                    <label>
                        <input type="radio" name="test" id="연령대1" value="1">유아
                    </label>
                    <label>
                        <input type="radio" name="test" id="연령대2" value="2">초등학생
                    </label>
                    <label>
                        <input type="radio" name="test" id="연령대3" value="3">중학생
                    </label>
                    <label>
                        <input type="radio" name="test" id="연령대4" value="4">고등학생
                    </label>
                    <label>
                        <input type="radio" name="test" id="연령대5" value="4">20대
                    </label>
                    <label>
                        <input type="radio" name="test" id="연령대6" value="4">30대
                    </label>
                    <label>
                        <input type="radio" name="test" id="연령대7" value="4">40대
                    </label>
                    <label>
                        <input type="radio" name="test" id="연령대8" value="4">50대
                    </label>
                    <label>
                        <input type="radio" name="test" id="연령대2" value="4">60대 이상
                    </label>
                </p>

                <!--포지션으로 띄우는 버튼들-->
                <button>이전 단계</button><!--1단계 일땐 가리기-->
                <button>다음 단계</button>
                <!--마지막 단계 시 나타나는 버튼 - 초기화 -->
                <button>다시추천받기</button>
            </form>
            <!--결과 값 공간 평소엔 가리고 결과 나올때 나타내기 js로 관리-->
        </section><!-- // #main End -->
    </div><!-- // .container End -->

</body>
</html>
