<!DOCTYPE html>
<html lang="ko">

    <div class="container">

            <!--버튼 박스-->
            <div class="user-select-area">
            </div>

            <div></div><!--책 선택 목록 10개만 배치-->

            <button>이전 단계</button><!--1단계 일땐 가리기-->
            <button>다음 단계</button>
